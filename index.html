<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frictionless Online Competition</title>
    
    <!-- Tailwind Play CDN with Custom Theme -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    
    <!-- Custom Theme Configuration -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Background Colors
              'white-luxury': '#FAFAFA',
              'white-pure': '#FFFFFF',
              
              // Gold Theme
              'gold': '#D4AF37',
              'gold-light': '#F4E8C1',
              'gold-dark': '#AA882C',
              'gold-glow': 'rgba(212, 175, 55, 0.15)',
              
              // Typography
              'charcoal': '#1A1A1A',
              'charcoal-light': '#2D2D2D',
              'charcoal-gray': '#4A4A4A',
              
              // Accents
              'gold-gradient-start': '#D4AF37',
              'gold-gradient-end': '#AA882C',
            },
            fontFamily: {
              'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
              'display': ['Playfair Display', 'Georgia', 'serif'],
            },
            boxShadow: {
              'gold': '0 4px 20px rgba(212, 175, 55, 0.25)',
              'gold-lg': '0 8px 40px rgba(212, 175, 55, 0.35)',
              'gold-inner': 'inset 0 2px 4px rgba(212, 175, 55, 0.1)',
            },
            animation: {
              'pulse-gold': 'pulse-gold 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2s linear infinite',
              'float': 'float 3s ease-in-out infinite',
            },
            keyframes: {
              'pulse-gold': {
                '0%, 100%': { opacity: 1 },
                '50%': { opacity: 0.6 },
              },
              'shimmer': {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            },
            backgroundImage: {
              'gold-gradient': 'linear-gradient(135deg, #D4AF37 0%, #AA882C 100%)',
              'gold-gradient-light': 'linear-gradient(135deg, #F4E8C1 0%, #D4AF37 100%)',
            }
          }
        }
      }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    
    <style>
      /* Global Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #FAFAFA;
        color: #1A1A1A;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #F4E8C1;
        border-radius: 10px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #D4AF37;
        border-radius: 10px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #AA882C;
      }
      
      /* Gold Selection */
      ::selection {
        background-color: #D4AF37;
        color: #FFFFFF;
      }
      
      /* Focus Styles */
      *:focus-visible {
        outline: 2px solid #D4AF37;
        outline-offset: 2px;
      }
      
      /* Gradient Text Utility */
      .text-gold-gradient {
        background: linear-gradient(135deg, #D4AF37 0%, #AA882C 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      /* Gold Border Animation */
      .gold-border-animated {
        position: relative;
        border: 2px solid transparent;
        background-image: linear-gradient(white, white), 
                          linear-gradient(135deg, #D4AF37 0%, #AA882C 100%);
        background-origin: padding-box, border-box;
        background-clip: padding-box, border-box;
      }
      
      .gold-border-animated::before {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: inherit;
        padding: 2px;
        background: linear-gradient(135deg, #D4AF37 0%, #AA882C 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      
      /* Input Gold Focus */
      .input-gold-focus {
        transition: all 0.3s ease;
      }
      
      .input-gold-focus:focus {
        border-color: #D4AF37;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
      }
      
      /* Shimmer Effect for Loading */
      .shimmer {
        background: linear-gradient(90deg, 
          #F4E8C1 25%, 
          #D4AF37 50%, 
          #F4E8C1 75%
        );
        background-size: 200% 100%;
        animation: shimmer 2s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
